name: Native WebGPU Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches: 
      - master

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: fetch dependencies 
        run: |
          cd lib/dawn
          python tools/fetch_dawn_dependencies.py

      - name: Build and run
        run: |
          cd test
          rm -rf build
          ./build_and_run

